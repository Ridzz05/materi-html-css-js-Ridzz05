<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar JavaScript</title>
</head>
<body>
    <div class="nomor">
        <h1>
            Ini adalah Teks Pria Sigma
        </h1>
    </div>
    <script>
        document.querySelector(".nomor").style.color = "red";
        document.querySelector(".nomor").style.fontSize = "20px";
        document.querySelector(".nomor").style.fontWeight = "bold";
        document.querySelector(".nomor").style.fontFamily = "Arial";
        document.querySelector(".nomor").style.textAlign = "center";
    </script>
</body>
</html>
